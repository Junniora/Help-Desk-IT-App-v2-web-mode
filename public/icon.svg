<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo con gradiente -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Círculo de fondo -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)"/>
  
  <!-- Ticket principal -->
  <rect x="130" y="180" width="252" height="180" rx="15" fill="white" opacity="0.95"/>
  
  <!-- Líneas del ticket -->
  <line x1="160" y1="220" x2="352" y2="220" stroke="#667eea" stroke-width="8" stroke-linecap="round"/>
  <line x1="160" y1="260" x2="310" y2="260" stroke="#764ba2" stroke-width="6" stroke-linecap="round"/>
  <line x1="160" y1="290" x2="280" y2="290" stroke="#764ba2" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Check mark -->
  <circle cx="340" cy="320" r="30" fill="#28a745"/>
  <path d="M 328 320 L 336 328 L 352 312" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Decoración: pequeños tickets en el fondo -->
  <rect x="90" y="140" width="80" height="60" rx="8" fill="white" opacity="0.3"/>
  <rect x="342" y="140" width="80" height="60" rx="8" fill="white" opacity="0.3"/>
</svg>
